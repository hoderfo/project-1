<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 20px;
        }
        #editor {
            height: 400px;
            border: 1px solid black;
        }
        #output {
            margin-top: 20px;
            border: 1px solid black;
            min-height: 100px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h2>Online Code Runner</h2>
    <div id="editor"></div>
    <br>
    <button onclick="runCode()">
        Run
    </button>
    <br>
    <h3>Input</h3>
    <textarea id="stdin" rows="5" cols="50"></textarea>
    <h3>Output</h3>
    <pre id="output"></pre>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
